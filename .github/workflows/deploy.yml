name: 🚀 Deploy to O2Switch

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & Test
  # ──────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Backend deps ──────────────────────────
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      # ── Frontend build ────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_APP_NAME: Carlog

      # ── Upload artifacts ──────────────────────
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # 2. Deploy to O2Switch via SSH
  # ──────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to O2Switch
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      # ── Configure SSH ─────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 60
          EOF

      # ── Sync backend ──────────────────────────
      - name: Sync backend files
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            ./backend/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/backend/

      # ── Sync frontend dist ────────────────────
      - name: Sync frontend dist
        run: |
          rsync -avz --delete \
            ./frontend/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/frontend/dist/

      # ── Remote commands ───────────────────────
      - name: Install deps & restart PM2
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}/backend

            # Install/update npm deps (production only)
            npm ci --omit=dev

            # Recharger ou démarrer PM2
            if pm2 show carlog-api > /dev/null 2>&1; then
              pm2 reload carlog-api --update-env
            else
              pm2 start ecosystem.config.js
            fi

            pm2 save
            echo "✅ Déploiement terminé"
          ENDSSH

      - name: Deployment summary
        run: |
          echo "## 🚀 Déploiement réussi" >> $GITHUB_STEP_SUMMARY
          echo "- **Branche**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Serveur**: ${{ secrets.SSH_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://carlog.lucescomel.fr" >> $GITHUB_STEP_SUMMARY
